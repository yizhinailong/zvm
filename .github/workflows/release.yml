name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-macos
            os: macos
            arch: x86_64
            runner: macos-latest
          - target: aarch64-macos
            os: macos
            arch: aarch64
            runner: macos-latest
          - target: x86_64-linux
            os: linux
            arch: x86_64
            runner: ubuntu-latest
          - target: aarch64-linux
            os: linux
            arch: aarch64
            runner: ubuntu-latest
          - target: x86_64-windows
            os: windows
            arch: x86_64
            runner: windows-latest
          - target: aarch64-windows
            os: windows
            arch: aarch64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      - name: Package (Unix)
        if: matrix.os != 'windows'
        run: |
          cd zig-out/bin
          tar czf ../../zvm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz zvm

      - name: Package (Windows)
        if: matrix.os == 'windows'
        run: |
          cd zig-out/bin
          tar czf ../../zvm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz zvm.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: zvm-*.tar.gz
