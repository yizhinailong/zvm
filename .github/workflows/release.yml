name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            arch: x86_64-linux
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            arch: aarch64-linux
          - os: macos-latest
            target: aarch64-macos
            arch: aarch64-macos
          - os: macos-latest
            target: x86_64-macos
            arch: x86_64-macos
          - os: windows-latest
            target: x86_64-windows-gnu
            arch: x86_64-windows
          - os: windows-latest
            target: aarch64-windows-gnu
            arch: aarch64-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
        shell: bash

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p zvm-${{ github.ref_name }}-${{ matrix.arch }}
          cp zig-out/bin/zvm zvm-${{ github.ref_name }}-${{ matrix.arch }}/
          cp README.md LICENSE zvm-${{ github.ref_name }}-${{ matrix.arch }}/ 2>/dev/null || true
          tar czvf zvm-${{ github.ref_name }}-${{ matrix.arch }}.tar.gz zvm-${{ github.ref_name }}-${{ matrix.arch }}
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path "zvm-${{ github.ref_name }}-${{ matrix.arch }}"
          Copy-Item zig-out/bin/zvm.exe "zvm-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item README.md "zvm-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "zvm-${{ github.ref_name }}-${{ matrix.arch }}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "zvm-${{ github.ref_name }}-${{ matrix.arch }}" -DestinationPath "zvm-${{ github.ref_name }}-${{ matrix.arch }}.zip" -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: zvm-${{ github.ref_name }}-${{ matrix.arch }}
          path: |
            zvm-${{ github.ref_name }}-*.tar.gz
            zvm-${{ github.ref_name }}-*.zip
          retention-days: 7

  create-release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          pattern: zvm-${{ github.ref_name }}-*

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/zvm-${{ github.ref_name }}-*.tar.gz,artifacts/zvm-${{ github.ref_name }}-*.zip
          generate_release_notes: true
          body: |
            ## ZVM ${{ github.ref_name }}

            A fast, dependency-free Zig version manager.

            ### Installation

            Download the appropriate archive for your platform and extract it:

            **Linux/macOS:**
            ```bash
            tar xzvf zvm-${{ github.ref_name }}-<platform>.tar.gz
            cd zvm-${{ github.ref_name }}-<platform>
            sudo mv zvm /usr/local/bin/
            ```

            **Add to PATH:**
            ```bash
            export PATH="$HOME/.zvm/bin:$PATH"
            ```

            **Windows:**
            ```powershell
            Expand-Archive zvm-${{ github.ref_name }}-<platform>.zip
            ```

            ### Available Builds

            | Platform | Architecture | File |
            |----------|--------------|------|
            | Linux | x86_64 | `zvm-${{ github.ref_name }}-x86_64-linux.tar.gz` |
            | Linux | ARM64 | `zvm-${{ github.ref_name }}-aarch64-linux.tar.gz` |
            | macOS | Intel | `zvm-${{ github.ref_name }}-x86_64-macos.tar.gz` |
            | macOS | Apple Silicon | `zvm-${{ github.ref_name }}-aarch64-macos.tar.gz` |
            | Windows | x86_64 | `zvm-${{ github.ref_name }}-x86_64-windows.zip` |
            | Windows | ARM64 | `zvm-${{ github.ref_name }}-aarch64-windows.zip` |

            ### Quick Start

            ```bash
            zvm install master
            zvm use master
            zig version
            ```

            All binaries are built from the tagged source code. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for build logs.
