name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
          - os: ubuntu-latest
            target: aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-macos
          - os: macos-latest
            target: x86_64-macos
          - os: windows-latest
            target: x86_64-windows-gnu
          - os: windows-latest
            target: aarch64-windows-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
        shell: bash

      - name: Run tests
        run: zig build test
        shell: bash

      - name: Verify binary
        if: matrix.target == 'x86_64-linux-gnu' || matrix.target == 'aarch64-macos'
        run: zig-out/bin/zvm version
        shell: bash

  lint:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Check formatting
        run: zig fmt --check src/
        shell: bash
